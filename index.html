<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Clock APK</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
margin:0;
}

#clock{
font-size:60px;
font-weight:bold;
}

#date{
font-size:22px;
margin-top:10px;
}
</style>

</head>
<body>

<div id="clock">00:00:00</div>
<div id="date"></div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString();

document.getElementById("date").innerHTML=
now.toDateString();

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>

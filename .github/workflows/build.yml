name: Build Clock APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g cordova

      - run: |
          cordova create clockapp com.smartclock.pro SmartClock
          cd clockapp
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - run: |
          cd clockapp
          cordova build android --debug

      - uses: actions/upload-artifact@v4
        with:
          name: SmartClock-APK
          path: clockapp/platforms/android/app/build/outputs/apk/debug/*.apk
